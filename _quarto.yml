project:
  type: website
  output-dir: _site

website:
  title: "QGIS y Herramientas Python para el Análisis Geoespacial"
  description: "Curso básico-intermedio de QGIS ofrecido por el CEETI – UNAH"
  page-navigation: true
  back-to-top-navigation: true
  reader-mode: true

  navbar:
    title: "CEETI – QGIS"
    left:
      - text: "Inicio"
        href: index.qmd
      - text: "Temario"
        href: content/syllabus.qmd
      - text: "Módulos"
        menu:
          - text: "1. Introducción a QGIS y SIG"
            href: content/modulo1.qmd
          - text: "2. Carga y manejo de datos"
            href: content/modulo2.qmd
          - text: "3. Edición y geoprocesamiento básico"
            href: content/modulo3.qmd
          - text: "4. Análisis espacial para rutas"
            href: content/modulo4.qmd
          - text: "5. Automatización con Python y PyQGIS"
            href: content/modulo5.qmd
          - text: "6. Visualización avanzada y mapas finales"
            href: content/modulo6.qmd
          - text: "7. Integración y casos prácticos"
            href: content/modulo7.qmd
      - text: "Instructor"
        href: instructor.qmd
    right:
      - icon: github
        href: https://github.com/lalgonzales/ceeti_qgiscourse
        aria-label: GitHub

  sidebar:
    style: "floating"
    search: true
    collapse-level: 1
    contents:
      - text: "Inicio"
        href: index.qmd
      - text: "Temario"
        href: content/syllabus.qmd
      - section: "Módulos"
        contents:
          - text: "1. Introducción a QGIS y SIG"
            href: content/modulo1.qmd
          - text: "2. Carga y manejo de datos"
            href: content/modulo2.qmd
          - text: "3. Edición y geoprocesamiento básico"
            href: content/modulo3.qmd
          - text: "4. Análisis espacial para rutas"
            href: content/modulo4.qmd
          - text: "5. Automatización con Python y PyQGIS"
            href: content/modulo5.qmd
          - text: "6. Visualización avanzada y mapas finales"
            href: content/modulo6.qmd
          - text: "7. Integración y casos prácticos"
            href: content/modulo7.qmd
      - text: "Instructor"
        href: instructor.qmd

  page-footer:
    left: "© 2026 CEETI – Universidad Nacional Autónoma de Honduras"
    right:
      - icon: github
        href: https://github.com/lalgonzales/ceeti_qgiscourse

format:
  html:
    theme:
      light: [cosmo, assets/styles.css]
      dark: [darkly, assets/styles-dark.css]
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    highlight-style: github
    lang: es
